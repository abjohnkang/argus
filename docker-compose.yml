# SPEC-INFRA-001 — two-service Argus stack.
#
# Topology (see .moai/specs/SPEC-INFRA-001/research.md Section 6):
#   - `model` : Ollama runtime, internal-only (no host port mapping).
#                Owns the named volume holding the 32-67 GB Scout weights.
#   - `api`   : FastAPI backend, exposed to host on 127.0.0.1 only.
#                Talks to `model` via the default compose network using
#                the service DNS name `model`.
#
# REQ-INFRA-001 enforcement: api.ports uses the literal `127.0.0.1:` host
# prefix so the kernel never accepts a non-loopback connection.
#
# No top-level `version:` key — modern Compose Spec omits it; including it
# triggers a deprecation warning under Docker Compose v2+.

services:
  model:
    image: ollama/ollama:latest
    environment:
      # Ollama binds its own internal port inside the model container.
      # Not exposed to the host (no `ports:` key below).
      OLLAMA_HOST: 0.0.0.0:11434
      # Model tag for the model-entrypoint wrapper to pull on first run.
      # Defaults to llama4:scout per REQ-INFRA-004. Override at the host:
      #   MODEL=llama3.2:1b ./run_server.sh   (~1.3 GB; fits 8 GB systems)
      #   MODEL=llama3.2:3b ./run_server.sh   (~2.0 GB; recommended for laptops)
      MODEL: ${MODEL:-llama4:scout}
    volumes:
      - argus_ollama_models:/root/.ollama
      # Bind-mount the entrypoint wrapper that auto-pulls MODEL on first run.
      # Without this wrapper the stock ollama/ollama image only runs
      # `ollama serve` and never pulls models — /api/tags would stay empty,
      # OllamaAdapter.is_ready() would never flip true, and /health would
      # loop at 503 forever. See _model_entrypoint.sh at project root for
      # the wrapper logic (idempotent: skips pull if model already cached).
      - ./_model_entrypoint.sh:/usr/local/bin/_model_entrypoint.sh:ro
    entrypoint: ["/usr/local/bin/_model_entrypoint.sh"]
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    # REQ-INFRA-001: host-side bind locked to loopback. Do NOT remove the
    # `127.0.0.1:` prefix — that would expose the API on every interface.
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    environment:
      OLLAMA_HOST: http://model:11434
      MODEL: ${MODEL:-llama4:scout}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-2.0}
    depends_on:
      model:
        condition: service_started
    restart: unless-stopped

volumes:
  argus_ollama_models:
